<!DOCTYPE html>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>

<body>
<div id="root"><div id="loading">טוען את הכלי…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect } = React;

const T = {
  cream:"#F4F0E6", paper:"#FBF9F3", basalt:"#26322C", basalt2:"#33433A",
  green:"#4F7C46", greenLt:"#E7EFE2", cherry:"#B0432B", cherryLt:"#F3E0D9",
  wheat:"#C7972F", wheatLt:"#F4EAD0", ink:"#1E2722", muted:"#7C8A7E",
  line:"#DAD3C2", pos:"#3E7C4F", neg:"#BC3B2A",
};
const nis = (n)=>"₪"+Math.round(n).toLocaleString("he-IL");
const k   = (n)=>"₪"+Math.round(n/1000).toLocaleString("he-IL")+"K";
const pct = (n)=>n.toFixed(1)+"%";

/* ---------------- נתוני בסיס (כלליים / ניתנים להחלפה) ---------------- */
const DIST_PRODUCTS = [
  { name:"מוצר טרי א׳ (ק״ג)", supplier:38, compLo:70, compHi:80, target:75, vat:false },
  { name:"מוצר בוטיק (100ג)", supplier:7, compLo:12, compHi:16, target:14, vat:false },
  { name:"מוצר מעובד (ק״ג)", supplier:70, compLo:130, compHi:160, target:150, vat:true },
  { name:"בשר / חלבון (ק״ג)", supplier:70, compLo:85, compHi:110, target:95, vat:true },
  { name:"מוצר ממותג (יחידה)", supplier:55, compLo:90, compHi:130, target:110, vat:true },

];
const REST_DISHES = [
  { name:"מנה עיקרית", supplier:22, compLo:62, compHi:96, target:82, vat:true },
  { name:"מנת פתיחה", supplier:8, compLo:30, compHi:52, target:42, vat:true },
  { name:"קינוח", supplier:6, compLo:26, compHi:44, target:36, vat:true },
  { name:"קוקטייל / אלכוהול", supplier:9, compLo:42, compHi:66, target:54, vat:true },
  { name:"כוס יין", supplier:7, compLo:32, compHi:54, target:46, vat:true },
  { name:"קפה / משקה חם", supplier:2.5, compLo:11, compHi:17, target:14, vat:true },
];

const DIST_BENCH = [
  { label:"מרווח גולמי משוקלל", value:"28–33%", sub:"יעד ריאלי לעסק הפצה/קמעונאות מזון" },
  { label:"פחת — תוצרת טרייה", value:"8–12%", sub:"עם שרשרת קור טובה (ענפי: 10–20%)" },
  { label:"לוגיסטיקה / הובלה", value:"≤ 12%", sub:"מהמחזור — מעבר לכך פוגע ברווח" },
  { label:"מקטע סיטונאי", value:"~18%", sub:"מחיר סיטונאי כשיעור ממחיר הצרכן" },
  { label:"מסלול ראנווי", value:"18–24 חודשים", sub:"אופק תכנון ריאלי עד יציבות" },
  { label:"רווח תפעולי בריא", value:"6–12%", sub:"EBITDA כשיעור מהמחזור" },
];
const REST_BENCH = [
  { label:"עלות מזון (Food Cost)", value:"28–35%", sub:"חומר גלם כשיעור מהמחזור" },
  { label:"עלות עבודה (Labor)", value:"28–35%", sub:"שכר כולל כשיעור מהמחזור" },
  { label:"עלות פריים (Prime)", value:"≤ 60–65%", sub:"מזון + עבודה — המדד הקריטי" },
  { label:"שכירות / תפעול מקום", value:"6–10%", sub:"מהמחזור (ארנונה, חשמל, מים)" },
  { label:"רווח תפעולי בריא", value:"10–20%", sub:"EBITDA כשיעור מהמחזור" },
  { label:"פחת / בלאי", value:"2–5%", sub:"עם ניהול מלאי ומנות טוב" },
];

const DIST_CHECK = [
  "התחייבויות B2B חתומות לפני פריסת הון משמעותית",
  "ספק גיבוי לכל קטגוריית מוצר (אין תלות בספק יחיד)",
  "שרשרת קור מאומתת — פחת מתחת ל-12%",
  "מוצרי עוגן בתמהיל (מרווח גבוה, פחת אפסי)",
  "האב תפעולי באזור תעשייה — לא חנות רחוב יקרה",
  "השקעה ראשונית רזה (ליסינג) במקום רכישה מלאה",
  "ראנווי של 18–24 חודשים מתוקצב",
  "בדיקת נאותות הנדסית למבנה (קירור, רמפה, גישה)",
  "תמחור שמשאיר מרווח משוקלל 28–33% אחרי פחת",
  "רישוי עסק ותו תקן מזון בתוקף",
];
const REST_CHECK = [
  "אימות מיקום ותנועת לקוחות (לא רק שכר דירה זול)",
  "רישיון עסק + אישור משרד הבריאות",
  "תפריט מתומחר עם עלות פריים מתחת ל-65%",
  "ספק חומר גלם + גיבוי לכל קטגוריה מרכזית",
  "מטבח: ציוד, אוורור, מערכת כיבוי אש",
  "כוח אדם מאויש: מטבח, שירות, משמרות",
  "מערכת קופה/הזמנות + פלטפורמות משלוח",
  "עלות עבודה מתוכננת מתחת ל-35% מהמחזור",
  "שכירות מתחת ל-10% מהמחזור הצפוי",
  "ראנווי של 12–18 חודשים מתוקצב להרצה",
];

/* מזהה את סימן היחידה מתוך פונקציית הפורמט, כדי שההזנה הידנית תישאר נקייה */
function unitOf(fmt){
  if(!fmt) return {pre:"",suf:""};
  const s=String(fmt(1)).trim();
  if(s.startsWith("₪")) return {pre:"₪",suf:""};
  if(s.endsWith("%"))  return {pre:"",suf:"%"};
  return {pre:"",suf:""};
}
function Slider({label,value,set,min,max,step,fmt,hint}){
  const [draft,setDraft]=useState(null);
  const u=unitOf(fmt);
  // הטווח מתרחב אוטומטית אם הוזן ערך מחוץ לברירת המחדל
  const lo=Math.min(min,value), hi=Math.max(max,value);
  const outside=value<min||value>max;
  const commit=(raw)=>{
    const n=parseFloat(String(raw).replace(/[^0-9.\-]/g,""));
    if(!isNaN(n)) set(n);
    setDraft(null);
  };
  const shown=draft!==null?draft:String(value);
  return (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:8}}>
        <span style={{fontSize:13,fontWeight:600,color:T.ink}}>{label}</span>
        <span style={{display:"inline-flex",alignItems:"center",gap:1,fontSize:14,fontWeight:800,
          color:T.green,background:T.cream,border:"1px solid "+T.line,borderRadius:7,padding:"2px 7px"}}>
          {u.pre && <span>{u.pre}</span>}
          <input type="text" inputMode="decimal" value={shown}
            title="אפשר להקליד כל סכום — הסרגל יתרחב בהתאם"
            onFocus={(e)=>{setDraft(String(value));e.target.select();}}
            onChange={(e)=>setDraft(e.target.value)}
            onBlur={(e)=>commit(e.target.value)}
            onKeyDown={(e)=>{if(e.key==="Enter")e.target.blur();}}
            style={{width:Math.max(3,shown.length+1)+"ch",border:"none",background:"transparent",
              color:T.green,fontSize:14,fontWeight:800,fontFamily:"inherit",textAlign:"center",
              direction:"ltr",padding:0,outline:"none",fontVariantNumeric:"tabular-nums"}} />
          {u.suf && <span>{u.suf}</span>}
        </span>
      </div>
      <input type="range" min={lo} max={hi} step={step} value={value}
        onChange={(e)=>set(parseFloat(e.target.value))} style={{width:"100%"}} />
      {(hint||outside) && (
        <div style={{fontSize:11,color:outside?T.wheat:T.muted,marginTop:3}}>
          {outside?"ערך מחוץ לטווח המומלץ ("+(fmt?fmt(min):min)+"–"+(fmt?fmt(max):max)+") — הסרגל הותאם":hint}
        </div>
      )}
    </div>
  );
}
function Stat({label,value,tone,sub}){
  const color = tone==="pos"?T.pos:tone==="neg"?T.neg:T.basalt;
  return (
    <div style={{background:T.paper,border:"1px solid "+T.line,borderRadius:12,padding:"14px 16px"}}>
      <div style={{fontSize:12,color:T.muted,marginBottom:4}}>{label}</div>
      <div style={{fontSize:22,fontWeight:800,color,fontVariantNumeric:"tabular-nums",lineHeight:1.1}}>{value}</div>
      {sub && <div style={{fontSize:11,color:T.muted,marginTop:4}}>{sub}</div>}
    </div>
  );
}
function Chip({ok,children}){
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600,padding:"5px 11px",
      borderRadius:999,background:ok?T.greenLt:T.cherryLt,color:ok?T.pos:T.neg,
      border:"1px solid "+(ok?"#cfe0c6":"#e9cabf")}}>
      <span style={{fontSize:13}}>{ok?"✓":"▲"}</span>{children}
    </span>
  );
}
/* החזר השקעה: כשאין רווח תפעולי חיובי אין החזר — מציגים את הפער הנדרש במקום מקף ריק */
function PaybackStat({invest,ebitda,revenue,breakeven}){
  if(ebitda>0){
    const months=Math.ceil(invest/ebitda);
    const years=(months/12).toFixed(1);
    return <Stat label="החזר השקעה" value={months+" חודשים"} tone="pos" sub={"כ-"+years+" שנים בקצב הרווח הנוכחי"} />;
  }
  const gap=isFinite(breakeven)?Math.max(0,breakeven-revenue):Infinity;
  const gapPct=revenue>0&&isFinite(gap)?(gap/revenue)*100:Infinity;
  return (
    <Stat label="החזר השקעה" value="אין החזר" tone="neg"
      sub={isFinite(gap)
        ? "העסק בהפסד. חסרים "+nis(gap)+" מחזור לחודש ("+gapPct.toFixed(1)+"%) כדי להגיע לאיזון"
        : "העסק בהפסד ואינו מגיע לאיזון בפרמטרים הנוכחיים"} />
  );
}
const th={textAlign:"right",padding:"10px 12px",fontSize:12,fontWeight:700,color:T.cream,background:T.basalt,position:"sticky",top:0};
const td={textAlign:"right",padding:"9px 12px",fontSize:13,color:T.ink,borderBottom:"1px solid "+T.line};
function Table({head,children}){
  return (
    <div style={{overflow:"auto",border:"1px solid "+T.line,borderRadius:12,background:T.paper}}>
      <table style={{width:"100%",borderCollapse:"collapse",minWidth:560}}>
        <thead><tr>{head.map((h,i)=><th key={i} style={th}>{h}</th>)}</tr></thead>
        <tbody>{children}</tbody>
      </table>
    </div>
  );
}
function Panel({title,children}){
  return (
    <div style={{background:T.paper,border:"1px solid "+T.line,borderRadius:14,padding:16,marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:800,color:T.basalt,marginBottom:12,paddingBottom:8,borderBottom:"2px solid "+T.greenLt}}>{title}</div>
      {children}
    </div>
  );
}
function SectionTitle({children}){
  return <div style={{fontSize:15,fontWeight:800,color:T.basalt,margin:"22px 0 12px",display:"flex",alignItems:"center",gap:8}}>
    <span style={{width:4,height:18,background:T.green,borderRadius:2}} />{children}</div>;
}
function Banner({title,body,tone}){
  const bg=tone==="green"?T.greenLt:T.wheatLt, bd=tone==="green"?"#cfe0c6":"#ecd9a8";
  return (
    <div style={{background:bg,border:"1px solid "+bd,borderRadius:12,padding:"13px 16px"}}>
      <div style={{fontSize:13,fontWeight:800,color:T.basalt,marginBottom:4}}>{title}</div>
      <div style={{fontSize:13,color:T.ink,lineHeight:1.6}}>{body}</div>
    </div>
  );
}

/* ---------------- גרפים מותאמים (ללא ספרייה) ---------------- */
function ColumnChart({data,height=220,fmt}){
  const vals=data.map(d=>d.v);
  const posMax=Math.max(0,...vals), negMax=Math.max(0,...vals.map(v=>-v));
  const range=(posMax+negMax)||1;
  const H=height-26;
  const zeroTop=(posMax/range)*H;
  return (
    <div style={{height}}>
      <div style={{position:"relative",height:H,display:"flex",alignItems:"flex-end",gap:16,padding:"0 6px"}}>
        <div style={{position:"absolute",left:0,right:0,top:zeroTop,borderTop:"1px solid "+T.ink}} />
        {data.map((d,i)=>{
          const h=Math.abs(d.v)/range*H;
          const top=d.v>=0?zeroTop-h:zeroTop;
          return (
            <div key={i} style={{flex:1,position:"relative",height:H}}>
              <div title={fmt?fmt(d.v):d.v} style={{position:"absolute",top,height:h,left:0,right:0,
                background:d.fill,borderRadius:d.v>=0?"6px 6px 0 0":"0 0 6px 6px"}} />
              <div style={{position:"absolute",top:d.v>=0?top-18:top+h+2,left:0,right:0,textAlign:"center",
                fontSize:11,fontWeight:700,color:T.basalt}}>{k(d.v)}</div>
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:16,padding:"6px 6px 0"}}>
        {data.map((d,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:11,color:T.muted}}>{d.name}</div>)}
      </div>
    </div>
  );
}
function GroupChart({data,series,height=250}){
  const all=data.flatMap(d=>series.map(s=>d[s.key]));
  const posMax=Math.max(0,...all), negMax=Math.max(0,...all.map(v=>-v));
  const range=(posMax+negMax)||1;
  const H=height-56;
  const zeroTop=(posMax/range)*H;
  return (
    <div style={{height}}>
      <div style={{position:"relative",height:H,display:"flex",alignItems:"flex-end",gap:24,padding:"0 10px"}}>
        <div style={{position:"absolute",left:0,right:0,top:zeroTop,borderTop:"1px solid "+T.ink}} />
        {data.map((d,i)=>(
          <div key={i} style={{flex:1,position:"relative",height:H,display:"flex",justifyContent:"center",gap:10}}>
            {series.map((s,j)=>{
              const v=d[s.key], h=Math.abs(v)/range*H, top=v>=0?zeroTop-h:zeroTop;
              return <div key={j} style={{width:28,position:"relative",height:H}}>
                <div title={nis(v)} style={{position:"absolute",top,height:h,left:0,right:0,background:s.color,
                  borderRadius:v>=0?"5px 5px 0 0":"0 0 5px 5px"}} />
                <div style={{position:"absolute",top:v>=0?Math.max(0,top-15):top+h+2,left:-8,right:-8,
                  textAlign:"center",fontSize:10,fontWeight:800,color:s.color,whiteSpace:"nowrap"}}>{k(v)}</div>
              </div>;
            })}
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:24,padding:"6px 10px 0"}}>
        {data.map((d,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:11,fontWeight:700,color:T.basalt}}>{d.name}</div>)}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:18,marginTop:6}}>
        {series.map((s,j)=>(
          <span key={j} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,color:T.ink}}>
            <span style={{width:12,height:12,background:s.color,borderRadius:3}} />{s.label}
          </span>
        ))}
      </div>
    </div>
  );
}
/* טבלת מספרים מדויקים מתחת לגרף — הגרף מראה מגמה, הטבלה מראה סכומים */
function ProjTable({proj}){
  return (
    <div style={{marginTop:10,overflow:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr>
          <th style={{...th,padding:"7px 10px"}}>שנה</th>
          <th style={{...th,padding:"7px 10px"}}>מחזור חודשי</th>
          <th style={{...th,padding:"7px 10px"}}>רווח תפעולי חודשי</th>
          <th style={{...th,padding:"7px 10px"}}>מחזור שנתי</th>
          <th style={{...th,padding:"7px 10px"}}>רווח שנתי</th>
        </tr></thead>
        <tbody>
          {proj.map((p,i)=>(
            <tr key={i} style={{background:i%2?T.cream:"transparent"}}>
              <td style={{...td,padding:"7px 10px",fontWeight:700}}>{p.name}</td>
              <td style={{...td,padding:"7px 10px"}}>{nis(p.rev)}</td>
              <td style={{...td,padding:"7px 10px",fontWeight:700,color:p.prof>=0?T.pos:T.neg}}>{nis(p.prof)}</td>
              <td style={{...td,padding:"7px 10px",color:T.muted}}>{nis(p.rev*12)}</td>
              <td style={{...td,padding:"7px 10px",fontWeight:700,color:p.prof>=0?T.pos:T.neg}}>{nis(p.prof*12)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ---------------- מחשבון תמחור (מנה / מוצר) ---------------- */
function PricerTab({mode}){
  const items = mode==="rest"?REST_DISHES:DIST_PRODUCTS;
  const [idx,setIdx]=useState(0);
  const safeIdx=Math.min(idx,items.length-1);
  const p=items[safeIdx];
  const [price,setPrice]=useState(p.target);
  useEffect(()=>{setPrice(items[safeIdx].target);},[mode,safeIdx]);
  const netCost=p.supplier;
  const margin=price>0?((price-netCost)/price)*100:0;
  const foodCostPct=price>0?(netCost/price)*100:0;
  const mid=(p.compLo+p.compHi)/2;
  const vsMid=((price-mid)/mid)*100;
  const inRange=price>=p.compLo&&price<=p.compHi;
  const scaleMax=p.compHi*1.4;
  const isRest=mode==="rest";
  return (
    <div>
      <Banner tone="green"
        title={isRest?"תמחור מנה — מול עלות חומר הגלם ומול תפריט השוק":"תמחור מוצר — מול מחיר הספק ומול המתחרים"}
        body={isRest
          ? "כלל אצבע במסעדנות: שאפו לעלות מזון של 28–35% מהמחיר (כלומר מרווח גולמי 65–72%). מנות עוגן עם עלות נמוכה מאזנות מנות יקרות יותר בתפריט."
          : "התאימו את המחיר כך שהמרווח הגולמי ישרת את היעד המשוקלל. מוצרי עוגן (מעובדים, מאריכי-חיים) עם פחת אפסי משפרים את הרווחיות הכוללת."} />
      <div style={{height:16}} />
      <Panel title={isRest?"מחשבון תמחור מנה":"מחשבון תמחור מוצר"}>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
          {items.map((pr,i)=>(
            <button key={i} onClick={()=>setIdx(i)} style={{fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:8,cursor:"pointer",

              <div style={{position:"absolute",top:8,right:(price/scaleMax*100)+"%",transform:"translateX(50%)",width:3,height:28,background:T.cherry,borderRadius:2}} />
              <div style={{position:"absolute",top:32,right:(p.compLo/scaleMax*100)+"%",fontSize:10,color:T.muted}}>{nis(p.compLo)}</div>
              <div style={{position:"absolute",top:32,right:(p.compHi/scaleMax*100)+"%",fontSize:10,color:T.muted}}>{nis(p.compHi)}</div>

            <div style={{fontSize:11,color:T.muted,marginTop:4}}>{isRest?"עלות חומר גלם":"מחיר ספק"}: <b>{nis(netCost)}</b> · יעד: <b>{nis(p.target)}</b> · {p.vat?"מע״מ מלא 18%":"מע״מ אפס"}</div>
          </div>
          <div style={{display:"grid",gap:10}}>
            <Stat label="מרווח גולמי" value={pct(margin)} tone={margin>=(isRest?60:25)?"pos":"neg"} />
            {isRest && <Stat label="עלות מזון (Food Cost)" value={pct(foodCostPct)} tone={foodCostPct<=35?"pos":"neg"} sub={foodCostPct<=35?"בתוך הטווח הבריא":"גבוה — שחקו עלות/מחיר"} />}
            <Stat label={isRest?"מול תפריט השוק":"מול ממוצע מתחרים"} value={(vsMid>=0?"+":"")+pct(vsMid)}
              sub={inRange?"בתוך טווח השוק":vsMid>0?"מעל השוק — סיכון":"מתחת לשוק — הזדמנות נפח"} tone={inRange?"pos":"neg"} />
          </div>
        </div>
      </Panel>
    </div>
  );
}

/* ---------------- מחשבון כדאיות — הפצה / קמעונאות ---------------- */
function FinanceDist({onReport}){
  const [invest,setInvest]=useState(320000);
  const [revenue,setRevenue]=useState(240000);
  const [baseMargin,setBaseMargin]=useState(38);
  const [waste,setWaste]=useState(8);
  const [rent,setRent]=useState(12000);
  const [salary,setSalary]=useState(35000);
  const [logistics,setLogistics]=useState(12000);
  const [insurance,setInsurance]=useState(3000);
  const [marketing,setMarketing]=useState(8000);
  const [overhead,setOverhead]=useState(4000);
  const [b2b,setB2b]=useState(50);
  const [c2b,setC2b]=useState(35);
  const gifts=Math.max(0,100-b2b-c2b);

  const calc=useMemo(()=>{
    const effMargin=Math.max(0,baseMargin-waste);
    const grossProfit=revenue*(effMargin/100);
    const opex=rent+salary+logistics+insurance+marketing+overhead;
    const ebitda=grossProfit-opex;
    const breakeven=effMargin>0?opex/(effMargin/100):Infinity;
    const logPct=(logistics/revenue)*100;
    const safety=revenue>0?((revenue-breakeven)/revenue)*100:0;
    const payback=ebitda>0?invest/ebitda:Infinity;
    const blended=(b2b*26+c2b*36+gifts*45)/100;
    return {effMargin,grossProfit,opex,ebitda,breakeven,logPct,safety,payback,blended};
  },[revenue,baseMargin,waste,rent,salary,logistics,insurance,marketing,overhead,invest,b2b,c2b,gifts]);

  const pnl=[
    {name:"הכנסות",v:revenue,fill:T.basalt},
    {name:"רווח גולמי",v:calc.grossProfit,fill:T.green},
    {name:"הוצאות תפעול",v:calc.opex,fill:T.wheat},
    {name:"רווח תפעולי",v:calc.ebitda,fill:calc.ebitda>=0?T.pos:T.neg},
  ];
  const proj=[1,2,3].map(y=>{
    const rMul=y===1?1:y===2?1.6:2.4, oMul=y===1?1:y===2?1.1:1.25;
    const r=revenue*rMul, gp=r*(calc.effMargin/100), op=calc.opex*oMul;
    return {name:"שנה "+y, rev:Math.round(r), prof:Math.round(gp-op)};
  });

  const buildReport=()=>({
    modeLabel:"הפצה / קמעונאות מזון", revenue, ebitda:calc.ebitda, proj,
    kpis:[
      {label:"מחזור חודשי",value:nis(revenue)},
      {label:"רווח גולמי / חודש",value:nis(calc.grossProfit),tone:"pos"},
      {label:"רווח תפעולי (EBITDA)",value:nis(calc.ebitda),tone:calc.ebitda>=0?"pos":"neg"},
      {label:"נקודת איזון (מחזור)",value:isFinite(calc.breakeven)?nis(calc.breakeven):"—"},
      {label:"החזר השקעה",value:calc.ebitda>0?Math.ceil(invest/calc.ebitda)+" חודשים":"אין החזר",
        tone:calc.ebitda>0?"pos":"neg",sub:calc.ebitda>0?"בקצב הרווח הנוכחי":"העסק בהפסד"},
    ],
    chips:[
      {ok:calc.effMargin>=20,text:"מרווח אפקטיבי "+pct(calc.effMargin)},
      {ok:waste<=15,text:"פחת "+waste+"%"},
      {ok:calc.logPct<=12,text:"לוגיסטיקה "+pct(calc.logPct)+" מהמחזור"},
      {ok:calc.safety>=0,text:(calc.safety>=0?"מעל נקודת איזון":"מתחת לאיזון")+" ("+pct(calc.safety)+")"},
    ],
    rows:[
      {label:"הכנסות",v:revenue,strong:true},
      {label:"עלות הסחורה (כולל פחת)",v:revenue-calc.grossProfit},
      {label:"רווח גולמי",v:calc.grossProfit,strong:true},
      {label:"שכירות מחסן",v:rent},
      {label:"שכר (צוות + יזם)",v:salary},
      {label:"לוגיסטיקה",v:logistics},
      {label:"ביטוחים",v:insurance},
      {label:"שיווק ומיתוג",v:marketing},
      {label:"שונות (חשמל/ארנונה/תקשורת)",v:overhead},
      {label:"סך הוצאות תפעול",v:calc.opex,strong:true},
      {label:"רווח תפעולי (EBITDA)",v:calc.ebitda,strong:true,neg:calc.ebitda<0},
    ],
    assumptions:[
      {label:"מרווח גולמי בסיס",value:baseMargin+"%"},
      {label:"פחת",value:waste+"%"},
      {label:"מרווח אפקטיבי",value:pct(calc.effMargin)},
      {label:"השקעה ראשונית",value:nis(invest)},
      {label:"תמהיל B2B",value:b2b+"%"},
      {label:"תמהיל C2B",value:c2b+"%"},
      {label:"מתנות / מעובד",value:gifts+"%"},
      {label:"צמיחה בתחזית",value:"שנה 2 ×1.6 · שנה 3 ×2.4"},
    ],
  });

  return (
    <div style={{display:"grid",gridTemplateColumns:"minmax(280px,360px) 1fr",gap:22}}>
      <div>
        <Panel title="הכנסות ומרווח">
          <Slider label="מחזור חודשי ממוצע (שנה 1)" value={revenue} set={setRevenue} min={80000} max={900000} step={5000} fmt={nis} hint="התאימו לתחזית המכירות שלכם" />
          <Slider label="מרווח גולמי בסיס (לפני פחת)" value={baseMargin} set={setBaseMargin} min={20} max={50} step={1} fmt={(v)=>v+"%"} hint="בוטיק/מעובד גבוה; טרי נמוך" />
          <Slider label="פחת (אובדן סחורה)" value={waste} set={setWaste} min={3} max={20} step={1} fmt={(v)=>v+"%"} hint="אומדן ענפי 10–20% לתוצרת טרייה" />
          <div style={{background:T.greenLt,borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:700,color:T.basalt}}>
            מרווח גולמי אפקטיבי: <span style={{color:T.green}}>{pct(calc.effMargin)}</span>
          </div>
        </Panel>
        <Panel title="הוצאות תפעול חודשיות">
          <Slider label="שכירות מחסן" value={rent} set={setRent} min={6000} max={25000} step={500} fmt={nis} />
          <Slider label="שכר (צוות + יזם)" value={salary} set={setSalary} min={25000} max={60000} step={1000} fmt={nis} />
          <Slider label="לוגיסטיקה (משאית+דלק+אגרות)" value={logistics} set={setLogistics} min={8000} max={30000} step={500} fmt={nis} hint="קו הולכה ארוך מייקר משמעותית" />
          <Slider label="ביטוחים" value={insurance} set={setInsurance} min={2000} max={6000} step={250} fmt={nis} />
          <Slider label="שיווק ומיתוג" value={marketing} set={setMarketing} min={3000} max={15000} step={500} fmt={nis} />
          <Slider label="שונות (חשמל/ארנונה/תקשורת)" value={overhead} set={setOverhead} min={2000} max={10000} step={500} fmt={nis} />
          <div style={{borderTop:"1px dashed "+T.line,paddingTop:8,fontSize:14,fontWeight:800,display:"flex",justifyContent:"space-between"}}>
            <span>סך הוצאות תפעול</span><span style={{color:T.wheat}}>{nis(calc.opex)}</span>
          </div>
        </Panel>
        <Panel title="השקעה ראשונית">
          <Slider label="השקעה (CAPEX)" value={invest} set={setInvest} min={180000} max={900000} step={10000} fmt={nis} hint="רזה (ליסינג) 180–350K · מלא (רכב) 450–900K" />
        </Panel>
      </div>

      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:16}}>
          <Stat label="רווח גולמי / חודש" value={nis(calc.grossProfit)} tone="pos" />
          <Stat label="רווח תפעולי (EBITDA)" value={nis(calc.ebitda)} tone={calc.ebitda>=0?"pos":"neg"} sub={calc.ebitda>=0?"רווחי":"הפסד חודשי"} />
          <Stat label="נקודת איזון (מחזור)" value={isFinite(calc.breakeven)?nis(calc.breakeven):"—"} sub="המחזור הדרוש לכיסוי" />
          <PaybackStat invest={invest} ebitda={calc.ebitda} revenue={revenue} breakeven={calc.breakeven} />

        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>
          <Chip ok={calc.effMargin>=20}>מרווח אפקטיבי {pct(calc.effMargin)} {calc.effMargin>=20?"תקין":"(<20% בעיית תמחור)"}</Chip>
          <Chip ok={waste<=15}>פחת {waste}% {waste<=15?"תקין":"(>15% בעיה תפעולית)"}</Chip>
          <Chip ok={calc.logPct<=12}>לוגיסטיקה {pct(calc.logPct)} מהמחזור {calc.logPct<=12?"":"(>12%)"}</Chip>
          <Chip ok={calc.safety>=0}>{calc.safety>=0?"מעל נקודת איזון":"מתחת לאיזון"} ({pct(calc.safety)})</Chip>
        </div>
        <Panel title="מבנה רווח חודשי"><ColumnChart data={pnl} /></Panel>
        <Panel title="תמהיל מכירות → מרווח מוצע">

              <Slider label="C2B (מנויים/מארזים)" value={c2b} set={(v)=>setC2b(Math.min(v,100-b2b))} min={0} max={100} step={5} fmt={(v)=>v+"%"} />

              <div style={{fontSize:12,color:T.muted}}>מרווח גולמי מוצע לתמהיל</div>
              <div style={{fontSize:30,fontWeight:800,color:T.green}}>{pct(calc.blended)}</div>
              <button onClick={()=>setBaseMargin(Math.round(calc.blended+waste))} style={{marginTop:8,fontSize:12,fontWeight:600,padding:"7px 14px",borderRadius:8,border:"none",background:T.basalt,color:"#fff",cursor:"pointer"}}>החל על המודל ↑</button>
              <div style={{fontSize:11,color:T.muted,marginTop:8}}>מוצרי עוגן בעלי מע״מ-מלא ופחת אפסי משפרים רווחיות</div>
            </div>
          </div>
        </Panel>
        <Panel title="תחזית 3 שנים (לפי הפרמטרים הנוכחיים)">

/* ---------------- מחשבון כדאיות — מסעדה / בית קפה ---------------- */
function FinanceRest({onReport}){
  const [invest,setInvest]=useState(600000);
  const [revenue,setRevenue]=useState(180000);
  const [foodCost,setFoodCost]=useState(30);
  const [waste,setWaste]=useState(4);
  const [labor,setLabor]=useState(32);
  const [rent,setRent]=useState(18000);
  const [otherOpex,setOtherOpex]=useState(30000);
  const [food,setFood]=useState(65);
  const [bev,setBev]=useState(25);
  const delivery=Math.max(0,100-food-bev);

  const calc=useMemo(()=>{
    const effFood=foodCost+waste;
    const grossMargin=Math.max(0,100-effFood);
    const grossProfit=revenue*(grossMargin/100);
    const laborCost=revenue*(labor/100);
    const prime=effFood+labor;
    const primeCost=revenue*(prime/100);
    const fixed=rent+otherOpex;
    const ebitda=grossProfit-laborCost-fixed;
    const contrib=Math.max(0,100-effFood-labor);
    const breakeven=contrib>0?fixed/(contrib/100):Infinity;
    const rentPct=(rent/revenue)*100;
    const safety=revenue>0?((revenue-breakeven)/revenue)*100:0;
    const payback=ebitda>0?invest/ebitda:Infinity;
    // מרווח גולמי משוקלל: אוכל ~68% · משקאות ~78% · משלוחים ~55% (אחרי עמלת פלטפורמה)
    const blended=(food*68+bev*78+delivery*55)/100;
    return {effFood,grossMargin,grossProfit,laborCost,prime,primeCost,fixed,ebitda,contrib,breakeven,rentPct,safety,payback,blended};
  },[revenue,foodCost,waste,labor,rent,otherOpex,invest,food,bev,delivery]);

  const pnl=[
    {name:"הכנסות",v:revenue,fill:T.basalt},
    {name:"רווח גולמי",v:calc.grossProfit,fill:T.green},
    {name:"עבודה + קבועות",v:calc.laborCost+calc.fixed,fill:T.wheat},
    {name:"רווח תפעולי",v:calc.ebitda,fill:calc.ebitda>=0?T.pos:T.neg},
  ];
  const proj=[1,2,3].map(y=>{
    const rMul=y===1?1:y===2?1.4:1.8, oMul=y===1?1:y===2?1.08:1.18;
    const r=revenue*rMul;
    const gp=r*(calc.grossMargin/100);
    const lc=r*(labor/100);
    const fx=calc.fixed*oMul;
    return {name:"שנה "+y, rev:Math.round(r), prof:Math.round(gp-lc-fx)};
  });

  const buildReport=()=>({
    modeLabel:"מסעדה / בית קפה", revenue, ebitda:calc.ebitda, proj,
    kpis:[
      {label:"מחזור חודשי",value:nis(revenue)},
      {label:"רווח גולמי / חודש",value:nis(calc.grossProfit),tone:"pos"},
      {label:"רווח תפעולי (EBITDA)",value:nis(calc.ebitda),tone:calc.ebitda>=0?"pos":"neg"},
      {label:"עלות פריים",value:pct(calc.prime),tone:calc.prime<=65?"pos":"neg",sub:"מזון + עבודה"},
      {label:"נקודת איזון (מחזור)",value:isFinite(calc.breakeven)?nis(calc.breakeven):"—"},
      {label:"החזר השקעה",value:calc.ebitda>0?Math.ceil(invest/calc.ebitda)+" חודשים":"אין החזר",
        tone:calc.ebitda>0?"pos":"neg",sub:calc.ebitda>0?"בקצב הרווח הנוכחי":"העסק בהפסד"},
    ],
    chips:[
      {ok:calc.prime<=65,text:"עלות פריים "+pct(calc.prime)},
      {ok:foodCost<=35,text:"עלות מזון "+foodCost+"%"},
      {ok:labor<=35,text:"עבודה "+labor+"%"},
      {ok:calc.rentPct<=10,text:"שכירות "+pct(calc.rentPct)+" מהמחזור"},
      {ok:calc.safety>=0,text:(calc.safety>=0?"מעל נקודת איזון":"מתחת לאיזון")+" ("+pct(calc.safety)+")"},
    ],
    rows:[
      {label:"הכנסות",v:revenue,strong:true},
      {label:"עלות מזון (כולל פחת)",v:revenue*(calc.effFood/100)},
      {label:"רווח גולמי",v:calc.grossProfit,strong:true},
      {label:"עלות עבודה",v:calc.laborCost},
      {label:"שכירות",v:rent},
      {label:"הוצאות תפעול נוספות",v:otherOpex},
      {label:"סך הוצאות קבועות",v:calc.fixed,strong:true},
      {label:"רווח תפעולי (EBITDA)",v:calc.ebitda,strong:true,neg:calc.ebitda<0},
    ],
    assumptions:[
      {label:"עלות מזון",value:foodCost+"%"},
      {label:"פחת / בלאי",value:waste+"%"},
      {label:"עלות עבודה",value:labor+"%"},
      {label:"מרווח גולמי אפקטיבי",value:pct(calc.grossMargin)},
      {label:"השקעה ראשונית",value:nis(invest)},
      {label:"תמהיל אוכל",value:food+"%"},
      {label:"תמהיל משקאות",value:bev+"%"},
      {label:"תמהיל משלוחים",value:delivery+"%"},
      {label:"צמיחה בתחזית",value:"שנה 2 ×1.4 · שנה 3 ×1.8"},
    ],
  });

  return (
    <div style={{display:"grid",gridTemplateColumns:"minmax(280px,360px) 1fr",gap:22}}>
      <div>
        <Panel title="הכנסות ועלות מזון">
          <Slider label="מחזור חודשי ממוצע" value={revenue} set={setRevenue} min={60000} max={700000} step={5000} fmt={nis} hint="כיסויים ביום × צ׳ק ממוצע × ימי פעילות" />
          <Slider label="עלות מזון / חומר גלם" value={foodCost} set={setFoodCost} min={20} max={45} step={1} fmt={(v)=>v+"%"} hint="בריא: 28–35% מהמחזור" />
          <Slider label="פחת / בלאי" value={waste} set={setWaste} min={1} max={12} step={1} fmt={(v)=>v+"%"} hint="עם ניהול מלאי טוב: 2–5%" />
          <div style={{background:T.greenLt,borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:700,color:T.basalt}}>
            מרווח גולמי אפקטיבי: <span style={{color:T.green}}>{pct(calc.grossMargin)}</span>
          </div>
        </Panel>
        <Panel title="עבודה, שכירות ותפעול">
          <Slider label="עלות עבודה (שכר כולל)" value={labor} set={setLabor} min={20} max={48} step={1} fmt={(v)=>v+"%"} hint="בריא: 28–35% מהמחזור" />
          <Slider label="שכירות (מקום)" value={rent} set={setRent} min={5000} max={60000} step={1000} fmt={nis} hint={"כ-"+calc.rentPct.toFixed(1)+"% מהמחזור · בריא ≤ 10%"} />
          <Slider label="הוצאות תפעול נוספות" value={otherOpex} set={setOtherOpex} min={8000} max={90000} step={1000} fmt={nis} hint={"חשמל/שיווק/ביטוח/חומרים/תמלוגים · כ-"+((otherOpex/revenue)*100).toFixed(0)+"% מהמחזור"} />
          <div style={{borderTop:"1px dashed "+T.line,paddingTop:8,fontSize:14,fontWeight:800,display:"flex",justifyContent:"space-between"}}>
            <span>סך הוצאות קבועות</span><span style={{color:T.wheat}}>{nis(calc.fixed)}</span>
          </div>
        </Panel>
        <Panel title="השקעה ראשונית">
          <Slider label="השקעה (הקמה/שיפוץ + ציוד)" value={invest} set={setInvest} min={200000} max={2000000} step={20000} fmt={nis} hint="בית קפה רזה ~250–500K · מסעדה מלאה 700K–2M" />
        </Panel>
      </div>

      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:16}}>
          <Stat label="רווח גולמי / חודש" value={nis(calc.grossProfit)} tone="pos" />
          <Stat label="רווח תפעולי (EBITDA)" value={nis(calc.ebitda)} tone={calc.ebitda>=0?"pos":"neg"} sub={calc.ebitda>=0?"רווחי":"הפסד חודשי"} />
          <Stat label="עלות פריים (מזון+עבודה)" value={pct(calc.prime)} tone={calc.prime<=65?"pos":"neg"} sub="המדד הקריטי במסעדנות" />
          <Stat label="נקודת איזון (מחזור)" value={isFinite(calc.breakeven)?nis(calc.breakeven):"—"} sub="המחזור הדרוש לכיסוי" />
          <PaybackStat invest={invest} ebitda={calc.ebitda} revenue={revenue} breakeven={calc.breakeven} />
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>
          <Chip ok={calc.prime<=65}>עלות פריים {pct(calc.prime)} {calc.prime<=65?"תקין":"(>65% — קריטי)"}</Chip>
          <Chip ok={foodCost<=35}>עלות מזון {foodCost}% {foodCost<=35?"תקין":"(>35% גבוה)"}</Chip>
          <Chip ok={labor<=35}>עבודה {labor}% {labor<=35?"תקין":"(>35% גבוה)"}</Chip>
          <Chip ok={calc.rentPct<=10}>שכירות {pct(calc.rentPct)} מהמחזור {calc.rentPct<=10?"":"(>10%)"}</Chip>
          <Chip ok={calc.safety>=0}>{calc.safety>=0?"מעל נקודת איזון":"מתחת לאיזון"} ({pct(calc.safety)})</Chip>
        </div>
        <Panel title="מבנה רווח חודשי"><ColumnChart data={pnl} /></Panel>
        <Panel title="תמהיל מכירות → מרווח גולמי מוצע">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"center"}}>
            <div>
              <Slider label="אוכל" value={food} set={(v)=>setFood(Math.min(v,100-bev))} min={0} max={100} step={5} fmt={(v)=>v+"%"} />
              <Slider label="משקאות / בר" value={bev} set={(v)=>setBev(Math.min(v,100-food))} min={0} max={100} step={5} fmt={(v)=>v+"%"} />
              <div style={{fontSize:13,color:T.muted}}>משלוחים / טייקאווי: <b style={{color:T.ink}}>{delivery}%</b></div>
            </div>
            <div style={{textAlign:"center",background:T.cream,borderRadius:12,padding:16}}>
              <div style={{fontSize:12,color:T.muted}}>מרווח גולמי מוצע לתמהיל</div>
              <div style={{fontSize:30,fontWeight:800,color:T.green}}>{pct(calc.blended)}</div>
              <button onClick={()=>setFoodCost(Math.max(20,Math.round(100-calc.blended-waste)))} style={{marginTop:8,fontSize:12,fontWeight:600,padding:"7px 14px",borderRadius:8,border:"none",background:T.basalt,color:"#fff",cursor:"pointer"}}>החל על המודל ↑</button>
              <div style={{fontSize:11,color:T.muted,marginTop:8}}>משקאות ובר מרווח גבוה; משלוחים מנוכי עמלת פלטפורמה</div>
            </div>
          </div>
        </Panel>
        <Panel title="תחזית 3 שנים (לפי הפרמטרים הנוכחיים)">
          <GroupChart data={proj} series={[{key:"rev",color:T.basalt,label:"מחזור חודשי"},{key:"prof",color:T.green,label:"רווח תפעולי חודשי"}]} />
          <ProjTable proj={proj} />
        </Panel>
        <button onClick={()=>onReport(buildReport())} style={{width:"100%",fontSize:14,fontWeight:800,padding:"13px",
          borderRadius:12,border:"none",background:T.basalt,color:"#fff",cursor:"pointer"}}>
          הפק דוח גרפי להורדה ↓
        </button>
      </div>
    </div>
  );
}

function FinanceTab({mode,onReport}){
  return mode==="rest"?<FinanceRest onReport={onReport}/>:<FinanceDist onReport={onReport}/>;
}

/* ---------------- מדדי ענף ---------------- */
function BenchmarksTab({mode}){
  const data = mode==="rest"?REST_BENCH:DIST_BENCH;
  const isRest=mode==="rest";
  return (
    <div>
      <Banner tone="wheat"
        title={isRest?"מדדי ענף — מסעדה / בית קפה":"מדדי ענף — הפצה / קמעונאות מזון"}
        body={isRest
          ? "במסעדנות המדד שמכריע הוא עלות הפריים (מזון + עבודה). אם הוא חוצה 65%, גם מחזור גבוה לא יציל את הרווחיות. אלו טווחים בריאים מקובלים — לא הבטחה."
          : "בהפצת מזון הרווחיות נשענת על מרווח משוקלל, שליטה בפחת ועלות לוגיסטיקה נמוכה. מוצרי עוגן עם פחת אפסי הם הבלם נגד שחיקת המרווח."} />
      <div style={{height:16}} />
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}}>
        {data.map((b,i)=><Stat key={i} label={b.label} value={b.value} sub={b.sub} />)}
      </div>
      <SectionTitle>כללי אצבע לקבלת החלטה</SectionTitle>
      <div style={{fontSize:13,lineHeight:1.8,color:T.ink,background:T.paper,border:"1px solid "+T.line,borderRadius:12,padding:"14px 18px"}}>
        {isRest ? (
          <ul style={{margin:0,paddingInlineStart:20}}>
            <li><b>עלות פריים ≤ 60–65%</b> היא תנאי סף לרווחיות בת-קיימא.</li>
            <li>משקאות ובר הם מנוע מרווח — תמהיל גבוה יותר שלהם מרים את הרווח הגולמי.</li>
            <li>משלוחים מגדילים מחזור אך עמלת הפלטפורמה (כ-30%) שוחקת מרווח — תמחרו בהתאם.</li>
            <li>החזר השקעה ריאלי במסעדנות: <b>18–36 חודשים</b>; תקצבו ראנווי ל-12–18 חודשי הרצה.</li>
          </ul>
        ) : (
          <ul style={{margin:0,paddingInlineStart:20}}>
            <li>אמתו ביקוש עם <b>התחייבויות חתומות</b> לפני פריסת הון.</li>
            <li>שמרו לוגיסטיקה מתחת ל-12% מהמחזור — זה הסעיף ששובר מודלים.</li>
            <li>הזריקו מוצרי עוגן (מעובד/ממותג) להורדת הפחת המשוקלל.</li>
            <li>אופק תכנון ריאלי: <b>18–24 חודשים</b>, לא איזון בחודש החמישי.</li>
          </ul>
        )}
      </div>
      <p style={{fontSize:12,color:T.muted,marginTop:12}}>הנתונים הם טווחים ענפיים מקובלים לצורך התמצאות — לא נתונים מאומתים לעסק ספציפי.</p>
    </div>
  );
}

/* ---------------- צ׳קליסט היתכנות ---------------- */
function ChecklistTab({mode}){
  const items = mode==="rest"?REST_CHECK:DIST_CHECK;
  const [done,setDone]=useState({});
  useEffect(()=>{setDone({});},[mode]);
  const count=items.filter((_,i)=>done[i]).length;
  const progress=Math.round((count/items.length)*100);
  return (
    <div>
      <Banner tone="green"
        title="צ׳קליסט היתכנות — סמנו לפני שמשקיעים הון"
        body="עיקרון מנחה: אימות ביקוש ומוכנות תפעולית קודמים להוצאה. כל סעיף לא מסומן הוא סיכון פתוח." />
      <div style={{height:16}} />
      <div style={{background:T.paper,border:"1px solid "+T.line,borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
          <span style={{fontSize:13,fontWeight:700,color:T.basalt}}>מוכנות כוללת</span>
          <span style={{fontSize:14,fontWeight:800,color:progress>=70?T.green:T.wheat}}>{count}/{items.length} · {progress}%</span>
        </div>
        <div style={{height:10,background:T.cream,borderRadius:6,overflow:"hidden"}}>
          <div style={{width:progress+"%",height:"100%",background:progress>=70?T.green:T.wheat,transition:"width .2s"}} />
        </div>
      </div>
      <div style={{display:"grid",gap:8}}>
        {items.map((it,i)=>(
          <button key={i} onClick={()=>setDone(d=>({...d,[i]:!d[i]}))}
            style={{display:"flex",alignItems:"center",gap:12,textAlign:"right",cursor:"pointer",
              background:done[i]?T.greenLt:T.paper,border:"1px solid "+(done[i]?"#cfe0c6":T.line),
              borderRadius:10,padding:"12px 14px",fontSize:13,color:T.ink}}>
            <span style={{width:22,height:22,borderRadius:6,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
              background:done[i]?T.green:"transparent",border:"2px solid "+(done[i]?T.green:T.line),color:"#fff",fontSize:14,fontWeight:800}}>
              {done[i]?"✓":""}</span>
            <span style={{fontWeight:done[i]?600:500,textDecoration:done[i]?"line-through":"none",opacity:done[i]?.75:1}}>{it}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ---------------- App ---------------- */
function App(){
  const [mode,setMode]=useState("dist"); // dist | rest
  const [tab,setTab]=useState("finance");
  const [report,setReport]=useState(null);
  useEffect(()=>{ if(report) window.scrollTo(0,0); },[report]);
  if(report) return (
    <div style={{fontFamily:"system-ui,'Segoe UI',Arial,sans-serif",background:"#fff",minHeight:"100vh",color:T.ink,padding:"18px 16px 40px"}}>
      <div style={{maxWidth:900,margin:"0 auto"}}>
        <ReportView r={report} onClose={()=>setReport(null)} />
      </div>
    </div>
  );
  const tabs=[
    {id:"finance",label:"מחשבון כדאיות"},
    {id:"pricer",label:mode==="rest"?"תמחור מנה":"תמחור מוצר"},
    {id:"bench",label:"מדדי ענף"},
    {id:"check",label:"צ׳קליסט היתכנות"},
  ];
  const modes=[
    {id:"dist",label:"הפצה / קמעונאות"},
    {id:"rest",label:"מסעדה / בית קפה"},
  ];
  return (
    <div style={{fontFamily:"system-ui,'Segoe UI',Arial,sans-serif",background:T.cream,minHeight:"100vh",color:T.ink,padding:"18px 16px 40px"}}>
      <div style={{maxWidth:1180,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:4,flexWrap:"wrap"}}>
          <div style={{width:44,height:44,borderRadius:12,background:T.basalt,color:T.wheat,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800}}>₪</div>
          <div style={{flex:1,minWidth:200}}>
            <h1 style={{margin:0,fontSize:22,fontWeight:800,color:T.basalt}}>חישוב כדאיות עסק מזון</h1>
            <div style={{fontSize:12,color:T.muted}}>כלי אינטראקטיבי לבדיקת רווחיות, נקודת איזון והחזר השקעה — מתאים לכל עסק מזון</div>
          </div>
          <div style={{display:"flex",gap:6,background:T.paper,border:"1px solid "+T.line,borderRadius:999,padding:4}}>
            {modes.map(m=>(
              <button key={m.id} onClick={()=>setMode(m.id)} style={{fontSize:13,fontWeight:700,padding:"7px 16px",borderRadius:999,cursor:"pointer",border:"none",
                background:mode===m.id?T.green:"transparent",color:mode===m.id?"#fff":T.muted}}>{m.label}</button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:4,borderBottom:"2px solid "+T.line,margin:"18px 0 22px",flexWrap:"wrap"}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{fontSize:14,fontWeight:700,padding:"10px 18px",cursor:"pointer",border:"none",background:"transparent",
              color:tab===t.id?T.basalt:T.muted,borderBottom:"3px solid "+(tab===t.id?T.green:"transparent"),marginBottom:-2}}>{t.label}</button>
          ))}
        </div>
        {tab==="finance"&&<FinanceTab mode={mode} onReport={setReport}/>}
        {tab==="pricer"&&<PricerTab mode={mode}/>}
        {tab==="bench"&&<BenchmarksTab mode={mode}/>}
        {tab==="check"&&<ChecklistTab mode={mode}/>}
        <div style={{fontSize:11,color:T.muted,marginTop:30,paddingTop:14,borderTop:"1px solid "+T.line,lineHeight:1.6}}>
          הנתונים הם הערכות וטווחים ענפיים לצורך התמצאות — לא נתונים היסטוריים מאומתים. שיעורי הפחת, המרווח ועלות העבודה הם אומדנים שיש לאמת מול הצעות מחיר וספקים ספציפיים לפני החלטה סופית. אינני יועץ פיננסי או משפטי.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
